name: 'campaign_attribution'
version: '1.0.0'
config-version: 2

profile: 'campaign_attribution'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  campaign_attribution:
    staging:
      +schema: staging
      +materialized: view
    intermediate:
      +schema: intermediate
      +materialized: ephemeral
    marts:
      +schema: marts
      +materialized: table

sources:
  - name: crm
    description: "Raw CRM data — touchpoints, deals, contacts"
    tables:
      - name: touchpoints
        description: "One row per marketing/sales touchpoint"
        columns:
          - name: touchpoint_id
            description: "Unique touchpoint identifier"
            tests:
              - unique
              - not_null
          - name: customer_id
            tests: [not_null]
          - name: deal_id
            tests: [not_null]
          - name: touchpoint_date
            tests: [not_null]
          - name: channel
            tests: [not_null]
